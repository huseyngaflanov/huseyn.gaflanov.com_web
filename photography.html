    <main>
      <h1 class="gallery-h1">Gallery</h1>
      <div id="gallery"></div>
      <div id="loading" class="loading">Loading photos...</div>
    </main>

    <!-- Fullscreen view -->
    <div class="fs-view" id="fs-view">
      <div class="fs-backdrop" onclick="closeFS()"></div>
      <div class="fs-content">
        <div class="fs-image-wrap">
          <div class="fs-spinner" id="fs-spinner">
            <div class="spinner"></div>
          </div>
          <img src="" id="fs-view-img" alt="">
          <div class="fs-controls">
            <button class="fs-btn" id="fs-prev" onclick="prevPhoto()">&#8592;</button>
            <button class="fs-btn fs-btn-close" onclick="closeFS()">&#x2715;</button>
            <button class="fs-btn fs-btn-exif fs-hidden" id="fs-info" onclick="fsInfo()">
              <i class="fa-regular fa-info"></i>
            </button>
            <button class="fs-btn fs-btn-download" id="fs-download">
              <i class="fa-regular fa-arrow-up-right-from-square"></i>
            </button>
            <button class="fs-btn" id="fs-next" onclick="nextPhoto()">&#8594;</button>
          </div>
          <div class="fs-counter" id="fs-counter"></div>
        </div>
        <div class="fs-exif" id="fs-exif">
          <div class="fs-exif-title">Photo Info</div>
          <div class="fs-exif-loading" id="fs-exif-loading">Loading...</div>
        </div>
      </div>
    </div>
